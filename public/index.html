<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRP - Índice de Reputación Pública</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .badge {
      display: inline-block;
      background: #1a3c5e;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }
    h1 {
      font-size: 1.6rem;
      color: #1a3c5e;
      margin-bottom: 0.5rem;
      font-weight: 800;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #1a3c5e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Por Vencejo Consultores</div>
    <h1>IRP</h1>
    <p class="subtitle">Índice de Reputación Pública</p>
    <div class="spinner"></div>
    <p class="status">Cargando instrumento...</p>
  </div>
  <script>
    // Placeholder — la app React se cargará aquí
    setTimeout(() => {
      document.querySelector('.status').textContent = 'Sitio en construcción. Próximamente.';
      document.querySelector('.spinner').style.display = 'none';
    }, 1500);
  </script>
</body>
</html>
